<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XenonLink | Originator Command</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- ABLY REALTIME SDK -->
    <script src="https://cdn.ably.com"></script>
    <style>
        :root { --neon-blue: #3b82f6; --neon-green: #10b981; --neon-red: #ef4444; }
        body { background: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; overflow: hidden; }
        .glass { background: rgba(255,255,255,0.02); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.05); }
        .owner-gradient { background: linear-gradient(to right, var(--neon-blue), #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .status-pulse { height: 10px; width: 10px; background: var(--neon-green); border-radius: 50%; box-shadow: 0 0 15px var(--neon-green); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.2); } }
        #activity-log::-webkit-scrollbar { width: 4px; }
        #activity-log::-webkit-scrollbar-thumb { background: var(--neon-blue); border-radius: 10px; }
    </style>
</head>
<body class="p-6 md:p-12">

    <!-- AUTH GATE: Pure Client-Side Admin Key -->
    <div id="auth-gate" class="fixed inset-0 z-50 bg-[#020617] flex items-center justify-center p-6">
        <div class="glass max-w-md w-full p-10 rounded-[3rem] text-center shadow-2xl">
            <h1 class="text-4xl font-black mb-2 owner-gradient tracking-tighter">XENONLINK</h1>
            <p class="text-[10px] uppercase tracking-[0.4em] opacity-40 mb-10">Originator Key Required</p>
            <input id="admin-key" type="password" placeholder="Enter Protocol Key" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl outline-none focus:border-blue-500 text-center text-sm mb-6">
            <button onclick="bootCommandCenter()" class="w-full bg-blue-600 text-white font-black p-5 rounded-2xl hover:bg-blue-500 transition uppercase tracking-widest text-[10px]">Initialize Command</button>
        </div>
    </div>

    <!-- COMMAND CENTER UI -->
    <div id="command-center" class="hidden max-w-7xl mx-auto space-y-10 opacity-0 transition-opacity duration-1000">
        <header class="flex justify-between items-center">
            <div>
                <h1 class="text-4xl font-black owner-gradient tracking-tighter">COMMAND_CENTER</h1>
                <p class="text-[10px] uppercase tracking-[0.4em] opacity-40 italic">FLEXI RANK // Real-time Administrative Shard</p>
            </div>
            <div class="glass px-8 py-4 rounded-[2rem] flex items-center gap-8">
                <div class="status-pulse"></div>
                <div class="flex flex-col">
                    <span class="text-[10px] font-black tracking-widest uppercase opacity-50 text-emerald-400">Signal: Optimal</span>
                    <span class="text-xs font-black tracking-widest uppercase">Users: <span id="user-count" class="text-blue-400">0</span></span>
                </div>
                <button onclick="location.reload()" class="text-red-500 font-black text-[9px] uppercase border-l border-white/10 pl-8 hover:opacity-50 transition">Disconnect</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- LEFT: BROADCAST & GHOST TOOLS -->
            <div class="lg:col-span-4 space-y-8">
                <div class="glass p-10 rounded-[3.5rem]">
                    <h3 class="text-[10px] font-black uppercase tracking-widest mb-6 text-blue-400">Global Force Sync</h3>
                    <textarea id="broadcast-msg" placeholder="Force broadcast to all active ghost frequencies..." class="w-full h-32 bg-white/5 border border-white/10 rounded-2xl p-5 text-xs outline-none focus:border-blue-500/50 transition resize-none"></textarea>
                    <button onclick="sendGlobalBroadcast()" class="w-full mt-4 bg-white text-black py-4 rounded-2xl font-black uppercase text-[10px] tracking-[0.3em] hover:bg-blue-500 hover:text-white transition">Broadcast Sync</button>
                </div>

                <div class="glass p-10 rounded-[3.5rem]">
                    <h3 class="text-[10px] font-black uppercase tracking-widest mb-6 text-emerald-400">Ghost Link Generator</h3>
                    <p class="text-[9px] opacity-40 mb-4 uppercase tracking-widest">Create a single-use deactivated link</p>
                    <button onclick="createGhostLink()" class="w-full bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 py-4 rounded-2xl font-black uppercase text-[10px] tracking-[0.3em] hover:bg-emerald-500 hover:text-black transition">Create Disposable Link</button>
                    <div id="link-box" class="mt-4 p-4 bg-black/40 rounded-xl hidden">
                        <code id="ghost-output" class="text-[9px] break-all text-slate-400 font-mono"></code>
                    </div>
                </div>
            </div>

            <!-- RIGHT: ACTIVITY REGISTRY -->
            <div class="lg:col-span-8">
                <div class="glass p-10 rounded-[3.5rem] h-full min-h-[600px] flex flex-col">
                    <h3 class="text-[10px] font-black uppercase tracking-widest mb-8 opacity-40">Live Pulse Registry</h3>
                    <div class="flex-1 overflow-y-auto" id="activity-log">
                        <table class="w-full text-left">
                            <thead class="text-[10px] uppercase tracking-widest opacity-20 border-b border-white/5">
                                <tr>
                                    <th class="pb-6">Target Client</th>
                                    <th class="pb-6">Status</th>
                                    <th class="pb-6 text-right">Administrative Action</th>
                                </tr>
                            </thead>
                            <tbody id="user-registry" class="text-xs">
                                <!-- Members auto-injected via Ably Presence -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. ABLY CONFIGURATION
        const ABLY_KEY = '9zundg.NEZh_w:mwZaZiYQgTY72hVVCu1ia-D58vqNNpirS2S1p3R11UE'; 
        let ably, channel, myAdminId;

        function bootCommandCenter() {
            const keyInput = document.getElementById('admin-key').value;
            if(!keyInput || ABLY_KEY.includes('YOUR')) {
                alert("Please insert your [Ably API Key](https://ably.com) into the code!");
                return;
            }

            // Initialization UI
            document.getElementById('auth-gate').style.display = 'none';
            const cmd = document.getElementById('command-center');
            cmd.classList.remove('hidden');
            setTimeout(() => cmd.style.opacity = '1', 10);

            myAdminId = 'ORIGINATOR-' + Math.random().toString(36).substr(2, 5);
            ably = new Ably.Realtime({ key: ABLY_KEY, clientId: myAdminId });
            channel = ably.channels.get('zync-global-pulse');

            // 2. LIVE PRESENCE: Monitoring checking activity
            channel.presence.subscribe(() => {
                channel.presence.get((err, members) => {
                    if(!err) updateRegistryTable(members);
                });
            });
            channel.presence.enter();
        }

        // 3. REGISTRY UPDATES
        function updateRegistryTable(members) {
            const table = document.getElementById('user-registry');
            document.getElementById('user-count').innerText = members.length;
            
            table.innerHTML = members.map(m => {
                if(m.clientId === myAdminId) return ''; // Don't show yourself
                return `
                <tr class="border-b border-white/5 group hover:bg-white/2 transition">
                    <td class="py-6 font-black text-blue-400">@${m.clientId}</td>
                    <td class="py-6 text-[9px] uppercase font-black text-emerald-500 tracking-widest flex items-center gap-2">
                        <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full"></span> Synced
                    </td>
                    <td class="py-6 text-right">
                        <button onclick="banishSignal('${m.clientId}')" class="bg-red-500/10 text-red-500 px-5 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest hover:bg-red-500 hover:text-white transition">
                            Banish Signal
                        </button>
                    </td>
                </tr>`;
            }).join('');
        }

        // 4. BANISHMENT: Remote Blocking Logic
        function banishSignal(targetId) {
            if(confirm(`Send remote Kill-Signal to ${targetId}? Session will be revoked immediately.`)) {
                // Publish to [Ably Pub/Sub](https://ably.com)
                channel.publish('kill-signal', { target: targetId });
            }
        }

        // 5. GLOBAL BROADCAST
        function sendGlobalBroadcast() {
            const msg = document.getElementById('broadcast-msg').value;
            if(!msg) return;
            channel.publish('broadcast-msg', { text: msg, rank: 'FLEXI' });
            document.getElementById('broadcast-msg').value = '';
            alert("Broadcast Protocol: Global Sync Successfully Dispatched.");
        }

        // 6. GHOST LINK GENERATOR
        function createGhostLink() {
            const sid = 'XL-' + Math.random().toString(36).substr(2, 9);
            const url = window.location.origin + '/chat.html?ghost=' + sid;
            
            // Mark link as Admin-created locally
            localStorage.setItem(`admin_auth_${sid}`, 'true');
            
            const box = document.getElementById('link-box');
            const output = document.getElementById('ghost-output');
            box.classList.remove('hidden');
            output.innerText = url;
            
            navigator.clipboard.writeText(url);
            alert("GHOST LINK INITIALIZED: Link will deactivate upon first guest entry.");
        }
    </script>
</body>
</html>
