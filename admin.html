<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zync | Originator Command</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .owner-gradient { background: linear-gradient(to right, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .status-online { height: 8px; width: 8px; background: #10b981; border-radius: 50%; box-shadow: 0 0 10px #10b981; }
    </style>
</head>
<body class="p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-3xl font-black tracking-tighter owner-gradient">COMMAND_CENTER</h1>
                <p class="text-[10px] uppercase tracking-[0.4em] opacity-40">Authorized Personnel Only // Flexi Rank</p>
            </div>
            <div class="glass-card px-6 py-3 rounded-2xl flex items-center gap-4">
                <div class="status-online"></div>
                <span class="text-xs font-bold tracking-widest">LIVE USERS: <span id="user-count">0</span></span>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-1 space-y-8">
                <div class="glass-card p-8 rounded-[2rem]">
                    <h3 class="text-xs font-black uppercase tracking-widest mb-6 opacity-60">Global Broadcast</h3>
                    <textarea id="broadcast-msg" placeholder="Force sync message to all devices..." 
                        class="w-full h-32 bg-white/5 border border-white/10 rounded-xl p-4 text-sm outline-none focus:border-blue-500/50 transition resize-none"></textarea>
                    <button onclick="sendBroadcast()" class="w-full mt-4 bg-white text-black py-4 rounded-xl font-bold uppercase text-[10px] tracking-[0.2em] hover:bg-blue-500 hover:text-white transition">
                        Broadcast Sync
                    </button>
                </div>

                <div class="glass-card p-8 rounded-[2rem]">
                    <h3 class="text-xs font-black uppercase tracking-widest mb-6 opacity-60">System Health</h3>
                    <div class="space-y-4">
                        <div class="flex justify-between text-[10px] font-bold"><span>DATABASE</span><span class="text-emerald-500">OPTIMAL</span></div>
                        <div class="flex justify-between text-[10px] font-bold"><span>NEURAL_LINK</span><span class="text-emerald-500">ACTIVE</span></div>
                        <div class="flex justify-between text-[10px] font-bold"><span>ENCRYPTION</span><span class="text-blue-500">AES-256</span></div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="glass-card p-8 rounded-[2rem] h-full">
                    <h3 class="text-xs font-black uppercase tracking-widest mb-6 opacity-60">Zync Registry Activity</h3>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="text-[10px] uppercase tracking-widest opacity-30 border-b border-white/5">
                                <tr>
                                    <th class="pb-4">User</th>
                                    <th class="pb-4">Status</th>
                                    <th class="pb-4 text-right">Action</th>
                                </tr>
                            </thead>
                            <tbody id="user-table" class="text-sm">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // MOCK DATA - Replace with real Supabase Fetch
        const mockUsers = [
            { id: 1, name: 'stacy_vibe', status: 'Active', color: 'text-emerald-400' },
            { id: 2, name: 'shadow_user', status: 'Suspicious', color: 'text-yellow-400' },
            { id: 3, name: 'glitch_trap', status: 'Active', color: 'text-emerald-400' }
        ];

        function loadUsers() {
            const table = document.getElementById('user-table');
            table.innerHTML = mockUsers.map(user => `
                <tr class="border-b border-white/5 group">
                    <td class="py-4 font-bold">${user.name}</td>
                    <td class="py-4 text-[10px] uppercase font-black ${user.color}">${user.status}</td>
                    <td class="py-4 text-right">
                        <button onclick="blockUser(${user.id})" class="text-[9px] font-black uppercase tracking-widest bg-red-500/10 text-red-500 px-3 py-1 rounded-lg hover:bg-red-500 hover:text-white transition">
                            Banish
                        </button>
                    </td>
                </tr>
            `).join('');
            document.getElementById('user-count').innerText = mockUsers.length + 142; // Real users + vanity
        }

        async function blockUser(id) {
            if(confirm("Banish this user from the Zync Shards forever?")) {
                // Logic to update Supabase 'is_banned' column
                alert("User has been disconnected.");
            }
        }

        async function sendBroadcast() {
            const msg = document.getElementById('broadcast-msg').value;
            if(!msg) return;
            // Your existing Supabase Broadcast logic here
            alert("Broadcast Synced.");
            document.getElementById('broadcast-msg').value = '';
        }

        window.onload = loadUsers;
    </script>
</body>
</html>
