<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zync Dashboard | Ghost Control</title>
<script src="https://cdn.tailwindcss.com"></script>
<!-- ABLY REALTIME & CHAT SDKs -->
<script src="https://cdn.ably.com"></script>
<script src="https://cdn.ably.com"></script>
<style>
    body { background: radial-gradient(circle at top left, #064e3b, #020617); min-height: 100vh; color: #ecfdf5; font-family: 'Inter', sans-serif; }
    .glass-box { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(16, 185, 129, 0.1); }
    .input-style { background: rgba(0,0,0,0.3); border: 1px solid rgba(16, 185, 129, 0.2); padding: 14px; border-radius: 16px; outline: none; width: 100%; transition: 0.3s; color: white; font-size: 13px; }
    .input-style:focus { border-color: #34d399; box-shadow: 0 0 20px rgba(52, 211, 153, 0.1); }
    .btn-primary { background: #10b981; color: #020617; font-weight: 900; padding: 14px; border-radius: 16px; transition: 0.3s; text-transform: uppercase; letter-spacing: 0.1em; font-size: 11px; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3); background: #34d399; }
    .multi-text { background: linear-gradient(to right, #34d399, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
</style>
</head>
<body class="p-6 md:p-12">

<nav class="max-w-7xl mx-auto flex justify-between items-center mb-12">
    <div class="flex items-center gap-4">
        <h1 class="text-3xl font-black multi-text tracking-tighter">ZYNC</h1>
        <div id="protocol-status" class="px-3 py-1 rounded-full border border-white/10 text-[9px] font-black uppercase tracking-widest text-slate-500">Protocol Offline</div>
    </div>
    <div class="flex items-center gap-6">
        <button onclick="logout()" class="text-red-400 text-[10px] font-black uppercase tracking-widest hover:opacity-70">Logout</button>
    </div>
</nav>

<div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-10">

    <!-- LEFT COLUMN: LIVE GHOST PULSE -->
    <div class="lg:col-span-5 space-y-8">
        <div class="glass-box p-10 rounded-[3rem] border-emerald-500/20 shadow-2xl">
            <h3 class="text-emerald-400 text-xs font-black uppercase tracking-[0.3em] mb-8">Ghost Pulse</h3>
            
            <div class="grid grid-cols-2 gap-4 mb-10 text-center">
                <div class="p-6 bg-black/40 rounded-3xl border border-white/5">
                    <p class="text-[9px] text-slate-500 font-bold uppercase mb-1">Live Frequency</p>
                    <h4 id="active-count" class="text-4xl font-black text-white">0</h4>
                    <p class="text-[8px] text-emerald-500 font-black uppercase mt-1">Users Online</p>
                </div>
                <div class="p-6 bg-black/40 rounded-3xl border border-white/5">
                    <p class="text-[9px] text-slate-500 font-bold uppercase mb-1">Total Zyncs</p>
                    <h4 id="total-zyncs" class="text-4xl font-black text-white">0</h4>
                    <p class="text-[8px] text-blue-400 font-black uppercase mt-1">Links Created</p>
                </div>
            </div>

            <div class="space-y-4">
                <p class="text-[10px] text-slate-400 font-medium italic mb-4">Generate a professional, one-time link for private discussion:</p>
                <button onclick="initiateGhostProtocol()" class="btn-primary w-full">Initialize Ghost Session</button>
                
                <div id="ghost-link-vault" class="mt-8 space-y-3">
                    <!-- Links appear here -->
                </div>
            </div>
        </div>
    </div>

    <!-- RIGHT COLUMN: PROFILE SYNC -->
    <div class="lg:col-span-7 space-y-8">
        <div class="glass-box p-10 rounded-[3rem]">
            <h3 class="text-blue-400 text-xs font-black uppercase tracking-[0.3em] mb-8">Architect Profile</h3>
            
            <div class="flex items-center gap-8 mb-10">
                <div class="relative group">
                    <img id="avatar-img" src="https://api.dicebear.com" class="w-24 h-24 rounded-full border-2 border-emerald-500/30 p-1 object-cover">
                    <div class="absolute inset-0 bg-black/60 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition cursor-pointer">
                        <span class="text-[9px] font-black">EDIT</span>
                    </div>
                </div>
                <div class="flex-1 space-y-4">
                    <input id="display-name" type="text" placeholder="Display Name" class="input-style">
                    <textarea id="user-bio" placeholder="Digital Frequency Bio..." class="input-style h-20 resize-none"></textarea>
                </div>
            </div>
            
            <button class="btn-primary w-full bg-blue-500 text-white">Update Digital Identity</button>
        </div>
    </div>
</div>

<script>
    // 1. ABLY CONFIGURATION (Professional Messaging Engine)
    const ABLY_KEY = 'YOUR_ABLY_KEY_HERE'; // Get free at [Ably.com](https://ably.com)
    let realtime, ghostChannel, myId;

    async function initProtocol() {
        myId = 'ADMIN-' + Math.random().toString(36).substr(2, 5);
        realtime = new Ably.Realtime({ key: ABLY_KEY, clientId: myId });

        // 2. LIVE PRESENCE: Tracking Activity
        const pulse = realtime.channels.get('zync-global-discovery');
        pulse.presence.subscribe(() => {
            pulse.presence.get((err, members) => {
                if(!err) document.getElementById('active-count').innerText = members.length;
            });
        });
        pulse.presence.enter();

        // 3. CONNECTION STATUS
        realtime.connection.on('connected', () => {
            const status = document.getElementById('protocol-status');
            status.innerText = "Protocol Online";
            status.classList.replace('text-slate-500', 'text-emerald-400');
            status.classList.add('border-emerald-500/50');
        });
    }

    // 4. GHOST LINK GENERATION (Deactivates after first use)
    let zyncCount = 0;
    function initiateGhostProtocol() {
        const sessionId = 'ZN-' + Math.random().toString(36).substr(2, 9);
        const ghostURL = window.location.origin + '/ghost-chat.html?session=' + sessionId;
        
        // Register Admin Security
        localStorage.setItem(`zync_admin_${sessionId}`, 'true');
        zyncCount++;
        document.getElementById('total-zyncs').innerText = zyncCount;

        const vault = document.getElementById('ghost-link-vault');
        const linkCard = document.createElement('div');
        linkCard.className = "p-5 bg-black/40 rounded-2xl border border-white/5 flex flex-col gap-3 animate-pulse";
        linkCard.innerHTML = `
            <div class="flex justify-between items-center">
                <span class="text-[9px] font-black text-emerald-500 uppercase tracking-widest">Single-Use Session</span>
                <span class="text-[8px] text-slate-500">Active Now</span>
            </div>
            <code class="text-[10px] text-slate-300 truncate font-mono">${ghostURL}</code>
            <button onclick="copyLink('${ghostURL}')" class="text-[9px] font-bold bg-white/5 py-2 rounded-lg border border-white/10 hover:bg-emerald-500 hover:text-black transition">COPY DISPOSABLE LINK</button>
        `;
        vault.prepend(linkCard);
    }

    function copyLink(url) {
        navigator.clipboard.writeText(url);
        alert("GHOST LINK COPIED: This link will DEACTIVATE after the first non-admin entry.");
    }

    function logout() {
        if(confirm("Terminate protocol and logout?")) {
            window.location.href = 'login.html';
        }
    }

    // Start everything
    initProtocol();
</script>
</body>
</html>
