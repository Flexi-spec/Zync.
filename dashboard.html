<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zync Dashboard | Control Center</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: radial-gradient(circle at top left, #064e3b, #020617); min-height: 100vh; color: #ecfdf5; font-family: 'Inter', sans-serif; }
        .glass-box { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(16, 185, 129, 0.1); }
        .input-style { background: rgba(0,0,0,0.3); border: 1px solid rgba(16, 185, 129, 0.2); padding: 12px; border-radius: 12px; outline: none; width: 100%; transition: 0.3s; color: white; }
        .input-style:focus { border-color: #34d399; box-shadow: 0 0 15px rgba(52, 211, 153, 0.1); }
        .btn-primary { background: linear-gradient(135deg, #10b981, #059669); color: #020617; font-weight: 800; padding: 12px; border-radius: 12px; transition: 0.3s; text-transform: uppercase; letter-spacing: 0.05em; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3); }
        .multi-text { background: linear-gradient(to right, #34d399, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="p-4 md:p-8">

    <nav class="max-w-6xl mx-auto flex justify-between items-center mb-10">
        <h1 class="text-2xl font-black multi-text">ZYNC <span class="text-white opacity-30 font-light ml-2">DASHBOARD</span></h1>
        <div class="flex items-center gap-4">
            <button onclick="window.open('profile.html?u=' + document.getElementById('username').value)" class="text-xs text-emerald-400 font-bold border border-emerald-500/30 px-4 py-2 rounded-full hover:bg-emerald-500/10 transition">View Live Profile</button>
            <button onclick="logout()" class="text-red-400 text-xs font-bold uppercase tracking-widest">Logout</button>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-4 space-y-6">
            <div class="glass-box p-8 rounded-[2.5rem] text-center">
                <div class="relative w-24 h-24 mx-auto mb-6 group">
                    <img id="avatar-preview" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Zync" class="w-24 h-24 rounded-full border-2 border-emerald-500/50 object-cover p-1">
                    <label class="absolute inset-0 flex items-center justify-center bg-black/60 rounded-full opacity-0 group-hover:opacity-100 cursor-pointer transition">
                        <span class="text-[10px] font-black">EDIT</span>
                        <input type="file" id="avatar-input" class="hidden" accept="image/*">
                    </label>
                </div>
                
                <div class="space-y-4 text-left">
                    <div>
                        <label class="text-[10px] uppercase tracking-widest text-emerald-500 font-bold ml-1">Username</label>
                        <input id="username" type="text" placeholder="username" class="input-style mt-1">
                    </div>
                    <div>
                        <label class="text-[10px] uppercase tracking-widest text-emerald-500 font-bold ml-1">Display Name</label>
                        <input id="display_name" type="text" placeholder="Your Name" class="input-style mt-1">
                    </div>
                    <div>
                        <label class="text-[10px] uppercase tracking-widest text-emerald-500 font-bold ml-1">Bio</label>
                        <textarea id="bio" placeholder="Tell the world..." class="input-style mt-1 h-24 resize-none"></textarea>
                    </div>
                    <button onclick="saveProfile()" class="btn-primary w-full mt-2">Sync Profile</button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-8 space-y-8">
            
            <div class="glass-box p-8 rounded-[2.5rem]">
                <h3 class="text-blue-400 text-xs font-black uppercase tracking-[0.2em] mb-6">Social Networks</h3>
                <div class="flex flex-col md:flex-row gap-3 mb-8">
                    <select id="link-platform" class="input-style md:w-1/3 bg-gray-900">
                        <option value="Instagram">Instagram</option>
                        <option value="TikTok">TikTok</option>
                        <option value="WhatsApp">WhatsApp</option>
                        <option value="Telegram">Telegram</option>
                        <option value="X">X (Twitter)</option>
                        <option value="Spotify">Spotify</option>
                    </select>
                    <input id="link-url" placeholder="Paste URL here..." class="input-style flex-1">
                    <button onclick="addLink()" class="btn-primary px-8">Add</button>
                </div>
                <div id="links-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    </div>
            </div>

            <div class="glass-box p-8 rounded-[2.5rem]">
                <h3 class="text-purple-400 text-xs font-black uppercase tracking-[0.2em] mb-6">Your Top Picks (Recs)</h3>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-3 mb-8">
                    <select id="rec-cat" class="input-style bg-gray-900">
                        <option value="music">🎧 Music</option>
                        <option value="app">🚀 App</option>
                        <option value="movie">🎬 Movie</option>
                        <option value="snack">🍬 Snack</option>
                    </select>
                    <input id="rec-name" placeholder="Name" class="input-style md:col-span-2">
                    <select id="rec-rating" class="input-style bg-gray-900">
                        <option value="5">⭐⭐⭐⭐⭐</option>
                        <option value="4">⭐⭐⭐⭐</option>
                        <option value="3">⭐⭐⭐</option>
                        <option value="2">⭐⭐</option>
                        <option value="1">⭐</option>
                    </select>
                    <button onclick="addRec()" class="btn-primary md:col-span-4">Add Recommendation</button>
                </div>
                <div id="recs-container" class="space-y-3">
                    </div>
            </div>

        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://dkqafrwchifzpftxhqwp.supabase.co";
        const SUPABASE_KEY = "sb_publishable_lSLvTgFSNcTWxnZhpW2YQA_p1rEtRXw";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;

        // AUTH CHECK
        async function init() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) { window.location.href = "login.html"; return; }
            currentUser = user;
            loadDashboardData();
        }

        async function loadDashboardData() {
            // Load Profile
            const { data: profile } = await supabaseClient.from('users').select('*').eq('id', currentUser.id).single();
            if (profile) {
                document.getElementById('username').value = profile.username || "";
                document.getElementById('display_name').value = profile.display_name || "";
                document.getElementById('bio').value = profile.bio || "";
                if(profile.avatar_url) document.getElementById('avatar-preview').src = profile.avatar_url;
            }

            // Load Links & Recs
            const { data: links } = await supabaseClient.from('links').select('*').eq('user_id', currentUser.id);
            const { data: recs } = await supabaseClient.from('recommendations').select('*').eq('user_id', currentUser.id);
            
            renderLinks(links || []);
            renderRecs(recs || []);
        }

        // SAVE PROFILE
        async function saveProfile() {
            const updates = {
                id: currentUser.id,
                username: document.getElementById('username').value,
                display_name: document.getElementById('display_name').value,
                bio: document.getElementById('bio').value
            };
            const { error } = await supabaseClient.from('users').upsert(updates);
            if (error) alert(error.message); else alert("Zync Profile Updated!");
        }

        // ADD LINK
        async function addLink() {
            const platform = document.getElementById('link-platform').value;
            const url = document.getElementById('link-url').value;
            if(!url) return;
            await supabaseClient.from('links').insert([{ user_id: currentUser.id, platform, url }]);
            loadDashboardData();
        }

        // ADD REC
        async function addRec() {
            const category = document.getElementById('rec-cat').value;
            const name = document.getElementById('rec-name').value;
            const rating = document.getElementById('rec-rating').value;
            if(!name) return;
            await supabaseClient.from('recommendations').insert([{ user_id: currentUser.id, category, name, rating: parseInt(rating) }]);
            loadDashboardData();
        }

        // RENDER FUNCTIONS
        function renderLinks(links) {
            const container = document.getElementById('links-container');
            container.innerHTML = links.map(l => `
                <div class="flex justify-between items-center bg-emerald-500/5 border border-emerald-500/10 p-4 rounded-2xl">
                    <div>
                        <p class="text-[10px] font-bold text-emerald-400 uppercase">${l.platform}</p>
                        <p class="text-xs truncate max-w-[150px] opacity-60">${l.url}</p>
                    </div>
                    <button onclick="deleteItem('links', '${l.id}')" class="text-red-500/50 hover:text-red-500 text-xs">Delete</button>
                </div>
            `).join('');
        }

        function renderRecs(recs) {
            const container = document.getElementById('recs-container');
            container.innerHTML = recs.map(r => `
                <div class="flex justify-between items-center bg-white/5 p-4 rounded-2xl border border-white/5">
                    <div class="flex gap-4 items-center">
                        <span class="text-xl">${r.category === 'music' ? '🎧' : r.category === 'app' ? '🚀' : '🎬'}</span>
                        <div>
                            <p class="font-bold text-sm">${r.name}</p>
                            <p class="text-xs text-emerald-400">${'⭐'.repeat(r.rating)}</p>
                        </div>
                    </div>
                    <button onclick="deleteItem('recommendations', '${r.id}')" class="text-red-500/50 text-xs">Delete</button>
                </div>
            `).join('');
        }

        async function deleteItem(table, id) {
            await supabaseClient.from(table).delete().eq('id', id);
            loadDashboardData();
        }

        function logout() {
            supabaseClient.auth.signOut().then(() => window.location.href = "login.html");
        }

        init();
    </script>
</body>
</html>
