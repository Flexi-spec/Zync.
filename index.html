<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zync | Ghost Protocol</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
<!-- 1. ADD ABLY SDK -->
<script src="https://cdn.ably.com"></script>
<style>
  body {
      background: radial-gradient(circle at bottom right, #064e3b, #020617);
      min-height: 100vh;
      color: #ecfdf5;
      font-family: 'Inter', sans-serif;
      scroll-behavior: smooth;
  }
  .glass-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(16, 185, 129, 0.1);
      transition: all 0.3s ease;
  }
  .zync-title {
      background: linear-gradient(to right, #34d399, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
  }
  .cta-button {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.4);
  }
  .nav-blur {
      background: rgba(2, 6, 23, 0.7);
      backdrop-filter: blur(10px);
  }
</style>
</head>
<body class="overflow-x-hidden">

<nav class="nav-blur fixed w-full z-50 px-6 py-4">
  <div class="max-w-6xl mx-auto flex justify-between items-center">
      <div class="text-2xl font-black tracking-tighter zync-title">ZYNC</div>
      <div class="flex gap-4">
          <div id="connection-status" class="text-[10px] font-bold uppercase tracking-widest text-emerald-500 opacity-50 pt-2">Offline</div>
          <a href="#" class="cta-button px-6 py-2 rounded-xl text-xs font-black uppercase tracking-widest">Dashboard</a>
      </div>
  </div>
</nav>

<section class="pt-48 pb-20 px-6">
  <div class="max-w-4xl mx-auto text-center">
      <h1 data-aos="fade-up" class="text-6xl md:text-8xl font-black mb-6 tracking-tight leading-none">
          Professional. <br> <span class="zync-title italic">One-Time.</span>
      </h1>
      <p data-aos="fade-up" data-aos-delay="100" class="text-gray-400 text-lg md:text-xl max-w-xl mx-auto mb-10">
          Share a ghost-link to chat privately. The link deactivates the moment they click. No WhatsApp clutter.
      </p>
      
      <!-- GHOST LINK GENERATOR -->
      <div data-aos="zoom-in" data-aos-delay="200" class="glass-card p-2 max-w-md mx-auto flex items-center rounded-2xl">
          <div class="pl-4 flex-shrink-0 text-emerald-500/50 font-mono text-sm">zync.bio/ghost/</div>
          <input type="text" id="ghost-input" placeholder="session-name" class="bg-transparent flex-1 py-3 px-2 outline-none text-white font-bold">
          <button onclick="createGhostLink()" class="bg-emerald-500 text-black px-6 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest hover:brightness-110 transition">
              Generate
          </button>
      </div>
      <div id="link-result" class="mt-4 text-[10px] text-emerald-400 font-mono hidden"></div>
  </div>
</section>

<!-- LIVE STATS POWERED BY ABLY -->
<div class="max-w-4xl mx-auto px-6 mb-20" data-aos="fade-up">
  <div class="glass-card py-6 px-10 rounded-3xl flex flex-col md:flex-row items-center justify-around gap-8">
      <div class="text-center">
          <p class="text-[10px] font-bold text-emerald-500 uppercase tracking-widest mb-1">Live Presence</p>
          <h3 class="text-3xl font-black" id="active-zyncers">0</h3>
      </div>
      <div class="h-10 w-[1px] bg-white/10 hidden md:block"></div>
      <div class="text-center">
          <p class="text-[10px] font-bold text-blue-400 uppercase tracking-widest mb-1">Global Messages</p>
          <h3 class="text-3xl font-black" id="total-messages">0</h3>
      </div>
  </div>
</div>

<script>
  AOS.init({ duration: 800, once: true });

  // 2. ABLY CONFIGURATION
  const ABLY_KEY = 'YOUR_ABLY_KEY_HERE'; // Get free key at [Ably.com](https://ably.com)
  const ably = new Ably.Realtime(ABLY_KEY);
  const globalChannel = ably.channels.get('zync-global-stats');

  // Track Connection
  ably.connection.on('connected', () => {
      document.getElementById('connection-status').innerText = "Protocol Online";
      globalChannel.presence.enter();
  });

  // 3. LIVE COUNTER LOGIC (Instant Updates)
  globalChannel.presence.subscribe(() => {
      globalChannel.presence.get((err, members) => {
          document.getElementById('active-zyncers').innerText = members.length;
      });
  });

  // 4. GHOST LINK LOGIC
  function createGhostLink() {
      const name = document.getElementById('ghost-input').value.trim() || 'anon';
      const secretId = Math.random().toString(36).substr(2, 9);
      const ghostUrl = window.location.origin + '/chat.html?session=' + secretId;
      
      // Store locally that we are the creator (so we don't get locked out)
      localStorage.setItem('zync_creator_' + secretId, 'true');
      
      const resultEl = document.getElementById('link-result');
      resultEl.innerText = "SHARE THIS ONCE: " + ghostUrl;
      resultEl.classList.remove('hidden');
      
      // Professional feedback
      console.log(`Ghost session ${name} initialized with ID ${secretId}`);
  }

  // Handle "Deactivation" logic on entry
  window.onload = () => {
      const params = new URLSearchParams(window.location.search);
      const session = params.get('session');
      
      if(session) {
          // If NOT creator and already joined once -> BURN
          if(!localStorage.getItem('zync_creator_' + session) && sessionStorage.getItem('zync_used_' + session)) {
              document.body.innerHTML = "<div class='h-screen flex items-center justify-center font-black text-emerald-500'>LINK DEACTIVATED: ACCESS REVOKED.</div>";
          } else {
              sessionStorage.setItem('zync_used_' + session, 'true');
              // Proceed to professional chat interface...
          }
      }
  };
</script>
</body>
</html>
