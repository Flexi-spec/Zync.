<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zync | Join the Vibe</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: radial-gradient(circle at top left, #064e3b, #020617); min-height: 100vh; color: #ecfdf5; }
        .glass-box { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(16, 185, 129, 0.2); }
    </style>
</head>
<body class="flex items-center justify-center p-6">

    <div class="glass-box w-full max-w-md p-10 rounded-[2rem] shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-emerald-400 tracking-tighter">ZYNC</h1>
            <p class="text-gray-400 mt-2">Create your aesthetic profile in seconds.</p>
        </div>

        <div class="space-y-4">
            <input id="email" type="email" placeholder="Email Address" 
                   class="w-full bg-emerald-900/20 border border-emerald-500/30 p-4 rounded-2xl outline-none focus:border-emerald-400">
            
            <input id="password" type="password" placeholder="Password" 
                   class="w-full bg-emerald-900/20 border border-emerald-500/30 p-4 rounded-2xl outline-none focus:border-emerald-400">

            <button onclick="handleAuth('signIn')" class="w-full bg-emerald-500 text-black font-bold p-4 rounded-2xl hover:bg-emerald-400 transition">
                Sign In
            </button>
            
            <button onclick="handleAuth('signUp')" class="w-full text-emerald-400 text-sm font-medium border border-emerald-500/20 p-4 rounded-2xl hover:bg-emerald-500/10">
                Create New Account
            </button>
        </div>

        <p id="msg" class="text-center mt-6 text-xs text-emerald-300 hidden"></p>
    </div>

    <script>
        const SUPABASE_URL = "https://dkqafrwchifzpftxhqwp.supabase.co";
        const SUPABASE_KEY = "sb_publishable_lSLvTgFSNcTWxnZhpW2YQA_p1rEtRXw";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function handleAuth(type) {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('msg');
            
            msg.innerText = "Processing...";
            msg.classList.remove('hidden');

            const { data, error } = type === 'signUp' 
                ? await supabase.auth.signUp({ email, password })
                : await supabase.auth.signInWithPassword({ email, password });

            if (error) {
                msg.innerText = error.message;
                msg.classList.add('text-red-400');
            } else {
                msg.innerText = type === 'signUp' ? "Check your email for the link!" : "Redirecting...";
                if(type === 'signIn') window.location.href = 'dashboard.html';
            }
        }
        window.onload = () => {
    const claimedName = localStorage.getItem('zync_claimed_username');
    const usernameInput = document.getElementById('signup-username'); // Make sure your signup input has this ID
    
    if (claimedName && usernameInput) {
        usernameInput.value = claimedName;
        // Optional: Clear it after use so it doesn't stay there forever
        localStorage.removeItem('zync_claimed_username');
        
        // Visual cue that the name is reserved
        usernameInput.classList.add('border-emerald-500');
        console.log("Username reserved: " + claimedName);
    }
};

    </script>
</body>
</html>
